name: stock_analyzer
description: 한국/미국 주식 분석 및 AI 기반 투자 추천 앱

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.0
  fl_chart: ^0.68.0
  provider: ^6.1.0
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.2
  shimmer: ^3.0.0
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#0F0A28"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
