<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockPulse - AI Stock Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/css/style.css?v=9">
</head>
<body>
  <nav class="navbar">
    <div class="nav-left">
      <a href="#/" class="nav-logo">
        <span class="logo-icon">S</span>
        <span class="logo-text">StockPulse</span>
      </a>
      <div class="nav-links">
        <a href="#/" class="nav-link" data-route="/">Dashboard</a>
        <a href="#/portfolio" class="nav-link" data-route="/portfolio">Portfolio</a>
        <a href="#/strategy" class="nav-link" data-route="/strategy">Strategy</a>
        <a href="#/backtest" class="nav-link" data-route="/backtest">Backtest</a>
      </div>
    </div>
    <div class="nav-right" style="gap:.75rem">
      <!-- User Menu -->
      <div class="user-menu" id="user-menu">
        <button class="user-menu-btn" id="user-menu-btn" title="Account">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span id="user-display-name" class="user-name"></span>
        </button>
        <div class="user-dropdown hidden" id="user-dropdown">
          <div class="user-dropdown-info" id="user-dropdown-info"></div>
          <button class="user-dropdown-item" id="logout-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Logout
          </button>
        </div>
      </div>
      <a href="#/login" class="auth-nav-btn hidden" id="login-nav-btn">Login</a>
      <button id="theme-toggle" class="theme-toggle" title="Toggle theme">
        <svg id="theme-icon-dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="theme-icon-light" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <div class="search-box">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="Search stocks..." autocomplete="off">
        <div id="search-dropdown" class="search-dropdown hidden"></div>
      </div>
    </div>
  </nav>

  <!-- Mobile Nav (visible at <=480px, sticky below navbar) -->
  <nav class="nav-bottom" id="nav-bottom">
    <a href="#/" class="nav-link" data-route="/"><span class="nav-link-icon">&#128200;</span>Dashboard</a>
    <a href="#/portfolio" class="nav-link" data-route="/portfolio"><span class="nav-link-icon">&#128188;</span>Portfolio</a>
    <a href="#/strategy" class="nav-link" data-route="/strategy"><span class="nav-link-icon">&#127919;</span>Strategy</a>
    <a href="#/backtest" class="nav-link" data-route="/backtest"><span class="nav-link-icon">&#9881;</span>Backtest</a>
  </nav>

  <main id="app"></main>

  <!-- Buy Modal -->
  <div id="buy-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content modal-content--sm">
      <div class="modal-header">
        <h2 id="buy-modal-title">Virtual Buy</h2>
        <button class="modal-close" onclick="document.getElementById('buy-modal').classList.add('hidden')">&times;</button>
      </div>
      <div id="buy-modal-body" class="modal-body">
        <div class="buy-form">
          <input type="hidden" id="buy-ticker">
          <input type="hidden" id="buy-name">
          <input type="hidden" id="buy-currency">
          <div class="buy-form-price">
            <div>
              <span class="buy-form-label">Current Price</span>
              <div id="buy-stock-name" style="font-size:.75rem;color:var(--text-muted);margin-top:.15rem"></div>
            </div>
            <span id="buy-price-display" class="buy-form-value">-</span>
          </div>
          <div class="buy-form-row">
            <label>Quantity <span class="buy-form-hint">(shares)</span></label>
            <div class="stepper">
              <button type="button" class="stepper-btn" tabindex="-1" onclick="var i=this.parentNode.querySelector('input');i.stepDown();i.dispatchEvent(new Event('input',{bubbles:true}))">&minus;</button>
              <input type="number" id="buy-qty" value="1" min="1" max="9999" class="buy-input stepper-input">
              <button type="button" class="stepper-btn" tabindex="-1" onclick="var i=this.parentNode.querySelector('input');i.stepUp();i.dispatchEvent(new Event('input',{bubbles:true}))">&plus;</button>
            </div>
          </div>
          <hr class="buy-form-divider">
          <div class="buy-form-row">
            <label>Take Profit <span class="buy-form-hint">(%)</span></label>
            <div class="stepper">
              <button type="button" class="stepper-btn" tabindex="-1" onclick="var i=this.parentNode.querySelector('input');i.stepDown();i.dispatchEvent(new Event('input',{bubbles:true}))">&minus;</button>
              <input type="number" id="buy-tp" value="5" step="0.5" min="0.5" max="100" class="buy-input stepper-input">
              <button type="button" class="stepper-btn" tabindex="-1" onclick="var i=this.parentNode.querySelector('input');i.stepUp();i.dispatchEvent(new Event('input',{bubbles:true}))">&plus;</button>
            </div>
          </div>
          <div class="buy-form-row">
            <label>Stop Loss <span class="buy-form-hint">(%)</span></label>
            <div class="stepper">
              <button type="button" class="stepper-btn" tabindex="-1" onclick="var i=this.parentNode.querySelector('input');i.stepDown();i.dispatchEvent(new Event('input',{bubbles:true}))">&minus;</button>
              <input type="number" id="buy-sl" value="-5" step="0.5" max="-0.5" min="-50" class="buy-input stepper-input">
              <button type="button" class="stepper-btn" tabindex="-1" onclick="var i=this.parentNode.querySelector('input');i.stepUp();i.dispatchEvent(new Event('input',{bubbles:true}))">&plus;</button>
            </div>
          </div>
          <div class="buy-form-row">
            <label>Hold Days <span class="buy-form-hint">(max)</span></label>
            <div class="stepper">
              <button type="button" class="stepper-btn" tabindex="-1" onclick="var i=this.parentNode.querySelector('input');i.stepDown();i.dispatchEvent(new Event('input',{bubbles:true}))">&minus;</button>
              <input type="number" id="buy-hold" value="20" min="1" max="365" class="buy-input stepper-input">
              <button type="button" class="stepper-btn" tabindex="-1" onclick="var i=this.parentNode.querySelector('input');i.stepUp();i.dispatchEvent(new Event('input',{bubbles:true}))">&plus;</button>
            </div>
          </div>
          <div id="buy-form-summary" class="buy-form-summary">
            <span class="buy-form-summary-label">Total</span>
            <span id="buy-total-display" class="buy-form-summary-value">-</span>
          </div>
          <button id="buy-confirm-btn" class="buy-confirm-btn buy-confirm-btn--buy">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
            Buy Now
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- AI Analysis Modal -->
  <div id="ai-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>AI Analysis</h2>
        <button class="modal-close">&times;</button>
      </div>
      <div id="ai-modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- Sell Confirmation Modal -->
  <div id="sell-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content modal-content--sm">
      <div class="modal-header">
        <h2 id="sell-modal-title">Confirm Sell</h2>
        <button class="modal-close" onclick="document.getElementById('sell-modal').classList.add('hidden')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="sell-form">
          <input type="hidden" id="sell-ticker-val">
          <input type="hidden" id="sell-reason-val">
          <input type="hidden" id="sell-max-qty">
          <div class="sell-form-icon" id="sell-form-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--sell)" stroke-width="1.5"><path d="M12 9v4m0 4h.01M3 12a9 9 0 1 1 18 0 9 9 0 0 1-18 0z"/></svg>
          </div>
          <div class="sell-form-info">
            <div class="sell-form-ticker" id="sell-display-ticker"></div>
            <div class="sell-form-name" id="sell-display-name"></div>
          </div>
          <div class="sell-form-details">
            <div class="sell-detail-row">
              <span>Avg Buy Price</span>
              <span id="sell-display-buy-price">-</span>
            </div>
            <div class="sell-detail-row">
              <span>Current Price</span>
              <span id="sell-display-cur-price">-</span>
            </div>
            <div class="sell-detail-row sell-detail-row--highlight">
              <span>Return</span>
              <span id="sell-display-return">-</span>
            </div>
            <div class="sell-detail-row" id="sell-reason-row">
              <span>Reason</span>
              <span id="sell-display-reason">-</span>
            </div>
          </div>
          <div class="buy-form-row">
            <label>Sell Quantity <span class="buy-form-hint" id="sell-qty-hint">(max: -)</span></label>
            <div style="display:flex;gap:.5rem;align-items:center">
              <div class="stepper">
                <button type="button" class="stepper-btn" tabindex="-1" onclick="var i=this.parentNode.querySelector('input');i.stepDown();i.dispatchEvent(new Event('input',{bubbles:true}))">&minus;</button>
                <input type="number" id="sell-qty" value="1" min="1" class="buy-input stepper-input">
                <button type="button" class="stepper-btn" tabindex="-1" onclick="var i=this.parentNode.querySelector('input');i.stepUp();i.dispatchEvent(new Event('input',{bubbles:true}))">&plus;</button>
              </div>
              <button type="button" id="sell-qty-all" class="sell-qty-all-btn">All</button>
            </div>
          </div>
          <div id="sell-form-summary" class="buy-form-summary">
            <span class="buy-form-summary-label">Sell Total</span>
            <span id="sell-total-display" class="buy-form-summary-value">-</span>
          </div>
          <div class="sell-form-buttons">
            <button class="sell-cancel-btn" onclick="document.getElementById('sell-modal').classList.add('hidden')">Cancel</button>
            <button id="sell-confirm-btn" class="sell-confirm-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
              Sell Now
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Config (API base URL) - edit config.js to change backend URL -->
  <script src="config.js"></script>
  <script>
    // Apply config before other scripts load
    window.__API_BASE = (typeof CONFIG !== 'undefined' && CONFIG.API_BASE) || '';
    window.__KAKAO_KEY = (typeof CONFIG !== 'undefined' && CONFIG.KAKAO_JS_KEY) || '';
  </script>
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.4/kakao.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <script src="static/js/components/utils.js?v=9"></script>
  <script src="static/js/auth.js?v=9"></script>
  <script src="static/js/api.js?v=9"></script>
  <script src="static/js/components/rec-card.js?v=9"></script>
  <script src="static/js/components/price-chart.js?v=9"></script>
  <script src="static/js/components/indicators.js?v=9"></script>
  <script src="static/js/components/financials.js?v=9"></script>
  <script src="static/js/components/news-list.js?v=9"></script>
  <script src="static/js/views/dashboard.js?v=9"></script>
  <script src="static/js/views/stock-detail.js?v=9"></script>
  <script src="static/js/views/backtest.js?v=9"></script>
  <script src="static/js/views/strategy.js?v=9"></script>
  <script src="static/js/views/login.js?v=9"></script>
  <script src="static/js/views/portfolio.js?v=9"></script>
  <script src="static/js/app.js?v=9"></script>
</body>
</html>
